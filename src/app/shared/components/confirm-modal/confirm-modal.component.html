<div class="modal-overlay anim-fade-in" *ngIf="isOpen" (click)="onCancel()">
    <div class="confirm-modal-glass anim-slide-up" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <div class="warning-icon" [class.danger]="isDanger">
                <span *ngIf="isDanger">⚠️</span>
                <span *ngIf="!isDanger">ℹ️</span>
            </div>
            <h2>{{ title }}</h2>
        </div>
        
        <div class="modal-body">
            <p>{{ message }}</p>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" (click)="onCancel()">{{ cancelText }}</button>
            <button class="btn-confirm" [class.danger]="isDanger" (click)="onConfirm()">
                {{ confirmText }}
            </button>
        </div>
    </div>
</div>
