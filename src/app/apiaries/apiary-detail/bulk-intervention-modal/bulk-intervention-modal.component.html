<div class="modal-backdrop anim-fade-in" (click)="closed.emit()"></div>

<div class="modal-panel anim-slide-up">
    <div class="modal-header">
        <div class="header-content">
            <span class="planning-icon">📅</span>
            <h2>Planiranje Intervencija</h2>
        </div>
        <button class="close-btn" (click)="closed.emit()">✕</button>
    </div>

    <div class="modal-body">
        <div class="info-banner">
            <span class="icon">ℹ️</span>
            <p>Ova akcija će kreirati navedenu intervenciju za <strong>sve košnice</strong> unutar ovog pčelinjaka odjednom.</p>
        </div>

        <div class="form-section">
            <div class="form-group split">
                <div>
                    <label>Tip intervencije</label>
                    <select [(ngModel)]="intType" class="form-input">
                        <option [value]="0">Prolećni pregled</option>
                        <option [value]="1">Uzimljavanje</option>
                        <option [value]="2">Prihranjivanje</option>
                        <option [value]="3">Vrcanje</option>
                        <option [value]="4">Tretman Lijekovima</option>
                        <option [value]="5">Ostalo</option>
                    </select>
                </div>
                <div>
                    <label>Datum planiranja</label>
                    <input type="date" [(ngModel)]="intPlannedDate" class="form-input">
                </div>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select [(ngModel)]="intStatus" class="form-input">
                    <option [value]="0">Planirano</option>
                    <option [value]="1">Završeno</option>
                </select>
            </div>

            <div class="form-group">
                <label>Opis / Napomena</label>
                <textarea [(ngModel)]="intDescription" placeholder="Unesite detalje intervencije..." class="form-input textarea" rows="3"></textarea>
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button class="btn-cancel" (click)="closed.emit()">Otkaži</button>
        <button class="btn-primary" (click)="addBulkIntervention()" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Spremanje...' : 'Primijeni na sve košnice' }}
        </button>
    </div>
</div>
